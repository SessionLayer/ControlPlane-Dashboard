      operationId: updateCa
      summary: Update a CA configuration (admin).
      description: |
        Updates a CA configuration's backend/keyReference/algorithm (the `name` and
        `caKind` are immutable; `rotationState` is managed by the rotation state
        machine, not editable here — use rotate). An algorithm/backend mismatch is
