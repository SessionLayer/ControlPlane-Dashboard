                $ref: '#/components/schemas/BreakglassPolicyResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateBreakglassPolicy
      summary: Update a break-glass policy (admin).
      description: |
        Replaces a break-glass policy's mutable fields (the `name` is immutable). A
        bad `authPath`/empty `alertTarget` is a `422`; a stale `version` is a `409`.
        Platform-RBAC gated (`breakglass:manage`) + audited.
      tags:
        - breakglass-policies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBreakglassPolicyRequest'
      responses:
        '200':
          description: The updated break-glass policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakglassPolicyResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteBreakglassPolicy
      summary: Delete a break-glass policy (admin).
      description: Deletes a break-glass policy (idempotent). Platform-RBAC gated (`breakglass:manage`) + audited.
      tags:
        - breakglass-policies
      responses:
        '204':
          description: The break-glass policy was deleted (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  # ===================================================================
  # Session 17 — runtime session management (list + terminate).
  # `sessions` is RUNTIME (never config); terminate reuses the S10 Lock
  # teardown path (Design §8.3/§8.4).
  # ===================================================================
  /v1/sessions:
    get:
      operationId: listSessions
      summary: List SSH sessions (admin).
      description: |
        Lists SSH sessions (`runtime.ssh_session`; Design §12A) with their decision
        snapshot (identity, node, principal, access model, capabilities, grant
        expiry). Optional filters narrow by identity, node, access model, and
        active-only. Cursor-paginated. Platform-RBAC gated (`audit:read`).
      tags:
        - sessions
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: identity
          in: query
          required: false
          description: Filter to one subject identity.
          schema:
            type: string
        - name: nodeId
          in: query
          required: false
          description: Filter to one node id.
          schema:
            type: string
            format: uuid
        - name: accessModel
          in: query
          required: false
          description: Filter to one access model.
          schema:
            type: string
            enum: [standing, jit, breakglass]
        - name: activeOnly
          in: query
          required: false
          description: When true, return only sessions that have not ended.
          schema:
            type: boolean
      responses:
        '200':
          description: A page of sessions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPage'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      operationId: getSession
      summary: Get an SSH session (admin).
      description: Returns one session by id. Platform-RBAC gated (`audit:read`).
      tags:
        - sessions
      responses:
        '200':
          description: The session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/sessions/{sessionId}/terminate:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      operationId: terminateSession
      summary: Terminate an SSH session (admin).
      description: |
        Tears down a live session by pushing a top-tier `Lock` (Design §8.3/§8.4)
        scoped to the session's subject identity, reusing the S10 teardown path — a
        deny that wins and is actively pushed to every Gateway (fail-closed). Because
        the wire `Lock` selector has no per-session facet, the teardown is
        identity-scoped (it also affects that identity's other live sessions); it is
        bounded by a short TTL so the identity may immediately reconnect under an
        unchanged policy. Idempotent. Platform-RBAC gated (`lock:write`) + audited.
      tags:
        - sessions
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateSessionRequest'
      responses:
        '202':
          description: The teardown lock was pushed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  # ===================================================================
  # Session 17 — COMPLETE-CONTRACT FREEZE (Part C). recordings + audit-events
  # are authored here as the FROZEN contract; the behavior (signed-URL
  # issuance, audit search) is implemented in Session 18 behind these
  # operations, which return `501 Not Implemented` until then. This is what
  # unblocks the Dashboard being built in parallel.
  # ===================================================================
  /v1/recordings:
    get:
      operationId: listRecordings
      summary: List session recordings (admin).
      description: |
        Lists session recording metadata (`runtime.recording_ref`; Design §12).
        NEVER returns recording bytes — replay/export issue short-lived signed URLs.
        Optional filters narrow by session, node, and identity. Cursor-paginated.
        Platform-RBAC gated (`recording:replay`).
      tags:
        - recordings
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: sessionId
          in: query
          required: false
          description: Filter to one session id.
          schema:
            type: string
            format: uuid
        - name: identity
          in: query
          required: false
          description: Filter to one subject identity.
          schema:
            type: string
        - name: nodeId
          in: query
          required: false
          description: Filter to one node id.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A page of recording metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingPage'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/recordings/{recordingId}:
    parameters:
      - $ref: '#/components/parameters/RecordingId'
    get:
      operationId: getRecording
      summary: Get session recording metadata (admin).
      description: |
        Returns one recording's metadata (never bytes). Platform-RBAC gated
        (`recording:replay`).
      tags:
        - recordings
      responses:
        '200':
          description: The recording metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteRecording
      summary: Governance-delete a recording (admin, privileged).
      description: |
        Governance-mode erasure escape hatch (Design §12.2/§12.3, FR-AUD-3/6): a
        specifically-privileged, audited role deletes the encrypted recording object
        and marks the metadata pruned. Platform-RBAC gated (`recording:delete`) +
        audited (FR-PADM-3). Refused (`409`) for a **compliance**-mode recording
        (truly un-deletable, object-lock) or one under **legal hold**. Idempotent —
        `204` whether or not the object was still present.
      tags:
        - recordings
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: The recording object was governance-deleted (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/recordings/{recordingId}/replay:
    parameters:
      - $ref: '#/components/parameters/RecordingId'
    post:
      operationId: replayRecording
      summary: Issue a replay signed URL (admin).
      description: |
        Issues a short-lived, single-object SIGNED URL for replaying a recording
        (Design §12.2/§18) — bytes NEVER proxy through the CP and the object stays
        customer-key encrypted (the CP cannot decrypt); the access is itself audited
        (FR-AUD-5/FR-PADM-3). Platform-RBAC gated (`recording:replay`), scopable by
        node-label/user/time (FR-PADM-2).
      tags:
        - recordings
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: A short-lived signed URL for replay.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedUrl'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/recordings/{recordingId}/export:
    parameters:
      - $ref: '#/components/parameters/RecordingId'
    post:
      operationId: exportRecording
      summary: Issue an export signed URL (admin).
      description: |
        Issues a short-lived, single-object SIGNED URL for exporting a recording
        (Design §12.2/§18) — bytes NEVER proxy through the CP and the object stays
        customer-key encrypted (the CP cannot decrypt); itself audited (FR-AUD-5).
        Platform-RBAC gated (`recording:export`), scopable (FR-PADM-2).
      tags:
        - recordings
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: A short-lived signed URL for export.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedUrl'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/recordings/{recordingId}/legal-hold:
    parameters:
      - $ref: '#/components/parameters/RecordingId'
    put:
      operationId: setRecordingLegalHold
      summary: Set or release a recording's legal hold (admin, privileged).
      description: |
        Places or releases a legal hold on a recording (Design §12.3, FR-AUD-6). A
        held recording is exempt from retention pruning AND governance delete in
        either WORM mode. Platform-RBAC gated (`recording:delete`) + audited
        (FR-PADM-3). Idempotent by desired state.
      tags:
        - recordings
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegalHoldRequest'
      responses:
        '200':
          description: The updated recording metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/audit-events:
    get:
      operationId: searchAuditEvents
      summary: Search the correlated audit stream (admin).
      description: |
        Searches the correlated audit stream (`runtime.audit_event`; Design §12,
        FR-AUD-8/9) — one append-only stream for SSH-session and web/admin events,
        correlated by id, newest-first. Search dimensions (FR-AUD-8): identity
        (`actor`), subject, action, outcome, node (`nodeId`) and node label
        (`nodeLabel`), session, source IP, capability, access model, and a time
        range; `correlationId` reconstructs one full path (approve → connect → run →
        replay, FR-AUD-9). Cursor-paginated. Read-only — a search never mutates the
        append-only stream and the hash chain stays verifiable. Platform-RBAC gated
        (`audit:read`); results are additionally filtered to the caller's RBAC scope
        (a node-label/user/time-scoped `audit:read` grant returns only in-scope
        events; an unscoped grant sees all).
      tags:
        - audit-events
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: actor
          in: query
          required: false
          description: Filter by acting identity.
          schema:
            type: string
        - name: subject
          in: query
          required: false
          description: Filter by the subject the action targeted.
          schema:
            type: string
        - name: action
          in: query
          required: false
          description: Filter by action name (e.g. `lock.create`).
          schema:
            type: string
        - name: outcome
          in: query
          required: false
          description: Filter by outcome.
          schema:
            type: string
        - name: sessionId
          in: query
          required: false
          description: Filter to one session id.
          schema:
            type: string
            format: uuid
        - name: nodeId
          in: query
          required: false
          description: Filter to one node id.
          schema:
            type: string
            format: uuid
        - name: sourceIp
          in: query
          required: false
          description: Filter by source IP.
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on occurrence time (RFC 3339).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Exclusive upper bound on occurrence time (RFC 3339).
          schema:
            type: string
            format: date-time
        - name: capability
          in: query
          required: false
          description: Filter to events whose capability set includes this capability (FR-AUD-8).
          schema:
            $ref: '#/components/schemas/Capability'
        - name: accessModel
          in: query
          required: false
          description: Filter by the session's access model (FR-AUD-8).
          schema:
            $ref: '#/components/schemas/AccessModel'
        - name: nodeLabel
          in: query
          required: false
          description: |
            Filter by a snapshot node label as `key=value` (FR-AUD-8). Repeatable;
            all supplied labels must match (AND).
          schema:
            type: array
            items:
              type: string
              maxLength: 512
        - name: correlationId
          in: query
          required: false
          description: Filter to one correlation id — the FR-AUD-9 full-path join key.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A page of audit events (newest first).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventPage'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/audit-events/{auditEventId}:
    parameters:
      - $ref: '#/components/parameters/AuditEventId'
    get:
      operationId: getAuditEvent
      summary: Get one audit event (admin) — FROZEN, 501 until Session 18.
      description: |
        Returns one audit event by id. Platform-RBAC gated (`audit:read`). FROZEN
        CONTRACT: returns `501` until Session 18.
      tags:
        - audit-events
      responses:
        '200':
          description: The audit event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '501':
          $ref: '#/components/responses/NotImplemented'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    oidcBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OIDC bearer access via an ID/JWT token validated by the Control Plane
        (Design §5.7, FR-AUTH-17). The ID token is the authentication proof.
    clientCredentials:
      type: oauth2
      description: |
        OAuth 2.0 client-credentials for machine consumers (Design §5.6,
        FR-AUTH-12). `private_key_jwt`/mTLS client authentication is preferred
        over static secrets.
      flows:
        clientCredentials:
          tokenUrl: https://controlplane.sessionlayer.example/oauth2/token
          scopes: {}
    mtls:
      type: mutualTLS
      description: |
        Mutual TLS client-certificate authentication (Design §5.7, FR-AUTH-17),
        also used by the internal CP<->Gateway plane.
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque forward-only pagination cursor from a previous page's `nextCursor`.
        Omit for the first page. An unrecognised cursor is a `400`.
      schema:
        type: string
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum items to return in one page (the server clamps to its maximum).
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Optional client-generated idempotency key scoping a mutating request. A
        retry with the same key, method, and path returns the original response and
        never repeats the side effect; the same key with a different request body is
        a `422`. Keys are retained for a bounded TTL.
      schema:
        type: string
        minLength: 1
        maxLength: 255
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoleId:
      name: roleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BindingId:
      name: bindingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CaId:
      name: caId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServiceAccountId:
      name: serviceAccountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NodePolicyId:
      name: nodePolicyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CapabilityDefId:
      name: capabilityDefId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JitPolicyId:
      name: jitPolicyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BreakglassPolicyId:
      name: breakglassPolicyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RecordingId:
      name: recordingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuditEventId:
      name: auditEventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Problem:
      description: An error occurred. The body is an RFC 9457 problem document.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotImplemented:
      description: |
        The operation is frozen in the contract but not yet implemented (Session 18).
        The body is an RFC 9457 problem document with `status` 501.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      title: RFC 9457 Problem Details
      description: |
        Problem details for HTTP APIs as defined by RFC 9457 (obsoletes RFC 7807).
        Error responses use media type `application/problem+json`.
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
          description: A URI reference identifying the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: The HTTP status code.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri-reference
          description: A URI reference identifying the specific occurrence.
      additionalProperties: true
    HealthStatus:
      type: object
      title: Health Status
      description: Liveness/readiness result, loosely modelled on the IETF health-check draft.
      required:
        - status
      properties:
        status:
          type: string
          description: Overall health indicator.
          enum:
            - pass
            - fail
            - warn
      additionalProperties: false
    ProtocolVersionRange:
      type: object
      title: Protocol Version Range
      description: An inclusive range of supported protocol versions, `major.minor` strings.
      required:
        - min
        - max
      properties:
        min:
          type: string
          pattern: '^[0-9]+\.[0-9]+$'
          description: Inclusive lowest supported protocol version, e.g. "1.0".
        max:
          type: string
          pattern: '^[0-9]+\.[0-9]+$'
          description: Inclusive highest supported protocol version, e.g. "1.0".
      additionalProperties: false
    VersionInfo:
      type: object
      title: Version Info
      description: Component build version and the protocol ranges it negotiates.
      required:
        - component
        - version
        - protocols
      properties:
        component:
          type: string
          description: Formal component name.
        version:
          type: string
          description: Component build version (SemVer 2.0.0).
        protocols:
          type: object
          title: Protocol Ranges
          description: Supported protocol version ranges by plane.
          required:
            - controlPlaneGatewayGrpc
            - agentGatewayWire
          properties:
            controlPlaneGatewayGrpc:
              $ref: '#/components/schemas/ProtocolVersionRange'
            agentGatewayWire:
              $ref: '#/components/schemas/ProtocolVersionRange'
          additionalProperties: false
      additionalProperties: false
    TokenRequest:
      type: object
      title: OAuth Token Request
      description: |
        Client-credentials token request (Design §5.6). Sent as
        `application/x-www-form-urlencoded`. Client authentication is by
        `client_assertion` (private_key_jwt) or by the mTLS client certificate;
        a static `client_secret` is accepted but discouraged.
      required:
        - grant_type
      properties:
        grant_type:
          type: string
          description: Must be `client_credentials`.
        client_id:
          type: string
        client_assertion_type:
          type: string
          description: 'For private_key_jwt: urn:ietf:params:oauth:client-assertion-type:jwt-bearer.'
        client_assertion:
          type: string
          description: The signed JWT client assertion (RFC 7523).
        client_secret:
          type: string
          description: Discouraged static secret (only if the SA uses client_secret).
        scope:
          type: string
      additionalProperties: false
    TokenResponse:
      type: object
      title: OAuth Token Response
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: The short-lived CP-signed bearer token.
        token_type:
          type: string
          description: Always `Bearer`.
        expires_in:
          type: integer
          format: int64
          description: Token lifetime in seconds.
        scope:
          type: string
      additionalProperties: false
    IssueOtpRequest:
      type: object
      title: Issue OTP Request
      required:
        - identity
        - allowedPrincipals
      properties:
        identity:
          type: string
          description: The identity the OTP authenticates (taken from the record, never client input at validation).
        allowedPrincipals:
          type: array
          items:
            type: string
        sourceCidr:
          type: string
          description: Optional source-CIDR binding (deny-only reducer).
        ttlSeconds:
          type: integer
          format: int32
          description: OTP lifetime (60–300s); defaults to the operator setting.
      additionalProperties: false
    IssuedOtp:
      type: object
      title: Issued OTP
      required:
        - otpId
        - otp
        - expiresAt
      properties:
        otpId:
          type: string
          format: uuid
        otp:
          type: string
          description: The raw OTP, returned ONCE for out-of-band delivery; only its hash is stored.
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
    CreatePinRequest:
      type: object
      title: Create Pin Request
      required:
        - fingerprint
        - identity
        - principals
        - ttlSeconds
      properties:
        fingerprint:
          type: string
          description: The pinned public-key fingerprint (SHA256:...).
        identity:
          type: string
        sourceCidr:
          type: string
          description: Source-CIDR binding (deny-only reducer, FR-AUTH-15).
        principals:
          type: array
          items:
            type: string
        ttlSeconds:
          type: integer
          format: int64
          description: Pin lifetime; capped at the authorization TTL (FR-AUTH-10).
      additionalProperties: false
    PinResource:
      type: object
      title: Pin
      required:
        - id
        - fingerprint
        - identity
        - principals
        - expiresAt
      properties:
        id:
          type: string
          format: uuid
        fingerprint:
          type: string
        identity:
          type: string
        sourceCidr:
          type: string
        principals:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
      additionalProperties: false
    PinList:
      type: object
      title: Pin List
      required:
        - pins
      properties:
        pins:
          type: array
          items:
            $ref: '#/components/schemas/PinResource'
      additionalProperties: false
    IssueServiceAccountCredentialRequest:
      type: object
      title: Issue Service-Account Credential Request
      required:
        - credentialType
      properties:
        credentialType:
          type: string
          enum:
            - private_key_jwt
            - mtls
            - client_secret
        publicKeyPem:
          type: string
          description: For private_key_jwt — the client's public key (PEM). Public material only.
        jwksUri:
          type: string
          description: For private_key_jwt — a JWKS URI reference (alternative to publicKeyPem).
        certificateFingerprint:
          type: string
          description: For mtls — the client certificate SHA-256 fingerprint.
        ttlSeconds:
          type: integer
          format: int64
          description: Credential validity; null = non-expiring until revoked.
      additionalProperties: false
    ServiceAccountCredentialResource:
      type: object
      title: Service-Account Credential
      required:
        - id
        - serviceAccountId
        - credentialType
        - status
        - issuedAt
      properties:
        id:
          type: string
          format: uuid
        serviceAccountId:
          type: string
          format: uuid
        credentialType:
          type: string
        fingerprint:
          type: string
        clientSecret:
          type: string
          description: For client_secret — the raw secret, returned ONCE; only its hash is stored.
        status:
          type: string
        issuedAt:
          type: string
          format: date-time
        notAfter:
          type: string
          format: date-time
      additionalProperties: false
    BeginDeviceFlowRequest:
      type: object
      title: Begin Device Flow Request
      properties:
        sourceIp:
          type: string
          description: The SSH source IP to bind for anti-phishing correlation (§5.2).
        connectionBinding:
          type: string
          description: An opaque 1:1 device-code↔connection binding value.
      additionalProperties: false
    DeviceFlowResource:
      type: object
      title: Device Flow
      required:
        - deviceFlowId
        - userCode
        - verificationUri
        - deviceCode
        - interval
        - expiresIn
      properties:
        deviceFlowId:
          type: string
          format: uuid
        userCode:
          type: string
          description: The short code the user enters at the verification page.
        verificationUri:
          type: string
          description: The CP-hosted verification page URL.
        verificationUriComplete:
          type: string
          description: Verification URI with the user code embedded (convenience).
        deviceCode:
          type: string
          description: The opaque device code the caller polls with (its own credential).
        interval:
          type: integer
          format: int32
          description: Minimum poll interval in seconds.
        expiresIn:
          type: integer
          format: int64
          description: Seconds until the flow expires.
      additionalProperties: false
    PollDeviceFlowRequest:
      type: object
      title: Poll Device Flow Request
      required:
        - deviceCode
      properties:
        deviceCode:
          type: string
      additionalProperties: false
    DeviceFlowStatus:
      type: object
      title: Device Flow Status
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - pending
            - authorized
            - denied
            - expired
        identity:
          type: string
          description: The resolved identity, present when status=authorized.
        sourceContextMatch:
          type: boolean
          description: Whether the approving browser source correlated with the SSH source (§5.2).
      additionalProperties: false
    LockMode:
      type: string
      title: Lock Mode
      description: |
        Lock enforcement mode (Design §8.3). `strict` tears down matching live
        sessions and blocks new ones; `best_effort` blocks new issuance but does
        not forcibly tear down an already-established session.
      enum:
        - strict
        - best_effort
    LockTarget:
      type: object
      title: Lock Target
      description: |
        What the lock matches (S5 LockMatching facets; OR-matched). At least one
        facet must be non-empty, OR `all` must be true — a global lock is never
        implicit (ingest rejects an empty target).
      properties:
        identities:
          type: array
          items:
            type: string
          description: Resolved subject identities to deny.
        groups:
          type: array
          items:
            type: string
          description: SSO/OIDC groups to deny (membership match).
        nodeIds:
          type: array
          items:
            type: string
            format: uuid
          description: Target node ids to deny.
        principals:
          type: array
          items:
            type: string
          description: Linux logins (principals) to deny.
        nodeLabels:
          type: array
          items:
            type: string
          description: Node labels ("key=value") to deny.
        all:
          type: boolean
          description: An explicit fleet-wide lock (deny everything). Required for a target with no other facet.
      additionalProperties: false
    CreateLockRequest:
      type: object
      title: Create Lock Request
      required:
        - target
        - reason
      properties:
        target:
          $ref: '#/components/schemas/LockTarget'
        reason:
          type: string
          description: Operator/audit reason (mandatory). Never disclosed to the SSH user (§7.1).
        mode:
          $ref: '#/components/schemas/LockMode'
          description: Enforcement mode; omitted defaults to `strict` (backward-compatible).
        ttlSeconds:
          type: integer
          format: int64
          description: Optional lock lifetime in seconds; omitted or null = no expiry (indefinite until released).
      additionalProperties: false
    LockResource:
      type: object
      title: Lock
      required:
        - id
        - target
        - reason
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        target:
          $ref: '#/components/schemas/LockTarget'
        reason:
          type: string
        mode:
          $ref: '#/components/schemas/LockMode'
          description: Enforcement mode (`strict` or `best_effort`).
        expiresAt:
          type: string
          format: date-time
          description: Absolute expiry; absent when the lock has no TTL.
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: The admin identity that created the lock.
      additionalProperties: false
    LockList:
      type: object
      title: Lock List
      required:
        - locks
      properties:
        locks:
          type: array
          items:
            $ref: '#/components/schemas/LockResource'
      additionalProperties: false
    IssueJoinTokenRequest:
      type: object
      title: Issue Join Token Request
      description: Request to mint a single-use agent join token bound to a node.
      required:
        - nodeName
      properties:
        nodeName:
          type: string
          minLength: 1
          maxLength: 253
          description: >-
            The stable node identity the token authorizes an agent to join as
            (FR-JOIN-6). The token is scoped to exactly this node.
        ttlSeconds:
          type: integer
          format: int32
          minimum: 1
          description: >-
            Optional TTL override (seconds). Omitted uses the configured default;
            the value is clamped to the configured maximum. Join tokens are
            short-lived by design.
      additionalProperties: false
    IssuedJoinToken:
      type: object
      title: Issued Join Token
      description: >-
        A freshly issued join token. The `token` field is the raw single-use
        bearer value and is returned exactly ONCE; only its hash is stored.
      required:
        - id
        - token
        - nodeName
        - joinMethod
        - singleUse
        - expiresAt
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          description: The raw single-use join token. Shown once; never retrievable again.
        nodeName:
          type: string
        joinMethod:
          type: string
          enum:
            - token
        singleUse:
          type: boolean
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
    JoinTokenResource:
      type: object
      title: Join Token
      description: Join-token metadata (never the raw token).
      required:
        - id
        - nodeName
        - joinMethod
        - singleUse
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        nodeName:
          type: string
        joinMethod:
          type: string
          enum:
            - token
        singleUse:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: The admin identity that issued the token.
      additionalProperties: false
    JoinTokenList:
      type: object
      title: Join Token List
      required:
        - joinTokens
      properties:
        joinTokens:
          type: array
          items:
            $ref: '#/components/schemas/JoinTokenResource'
      additionalProperties: false
    RegisterNodeRequest:
      type: object
      title: Register Node Request
      description: |
        Enrol an agentless node. `address` (host:port) is required; at least one of
        `hostCertificate` / `pinnedHostKey` is required (host-identity anchor — no
        TOFU, §9.3).
      required:
        - name
        - address
      properties:
        name:
          type: string
          description: The node's stable, unique human name (the enrollment key + the SSH addressing name).
        address:
          type: string
          description: The node sshd dial address, `host:port` (port defaults to 22 if omitted).
        labels:
          type: object
          additionalProperties:
            type: string
          description: Inventory labels ("key=value") used by data-plane rule/lock node selectors.
        hostCertificate:
          type: string
          description: The node's host-CA-signed OpenSSH host certificate line (the primary host-identity anchor).
        pinnedHostKey:
          type: string
          description: An explicitly pinned OpenSSH host public-key line (the fallback anchor when the node presents a plain host key).
        nodePolicyName:
          type: string
          description: Optional NodePolicy snapshot reference.
      additionalProperties: false
    QuarantineNodeRequest:
      type: object
      title: Quarantine Node Request
      required:
        - reason
      properties:
        reason:
          type: string
          description: Operator/audit reason (mandatory). Never disclosed to the SSH user (§7.1).
        existingSessions:
          type: string
          enum:
            - kill
            - drain
          default: kill
          description: How existing sessions are handled — `kill` (torn down at once) or `drain` (finish; no new channels).
        ttlSeconds:
          type: integer
          format: int64
          description: Optional quarantine-lock lifetime in seconds; omitted/null = indefinite until released.
      additionalProperties: false
    NodeResource:
      type: object
      title: Node
      required:
        - id
        - name
        - connectorKind
        - status
        - health
      properties:
        id:
          type: string
          format: uuid
        name:
