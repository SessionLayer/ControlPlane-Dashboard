              schema:
                $ref: '#/components/schemas/BreakglassActivationList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/breakglass/activations/{activationId}/review:
    post:
      operationId: reviewBreakglassActivation
      summary: Record the mandatory review of a break-glass activation (admin).
      description: |
        Records the mandatory post-hoc review of a break-glass activation (Design
        §7; FR-ACC-6/FR-AUD-7). Platform-RBAC gated (`breakglass:manage`) +
        audited.
      tags:
        - breakglass
      parameters:
        - name: activationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewBreakglassActivationRequest'
      responses:
        '200':
          description: The reviewed activation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakglassActivationResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  # ===================================================================
  # Session 17 — Config resource CRUD (FR-API-2/5). Contract-first; each
  # resource is platform-RBAC gated + audited, invalid config rejected
  # pre-commit (422). Config resources carry read-only `origin` provenance
  # and an optimistic-concurrency `version`.
  # ===================================================================
  /v1/rules:
    get:
      operationId: listRules
      summary: List data-plane rules (admin).
      description: |
        Lists data-plane RBAC rules (`config.dp_rule`, Design §6.1; FR-AUTHZ-1) —
        the typed allow/deny grants the S5 engine evaluates. A committed deny that
        must persist is a rule; "deny now and keep it" is a runtime `Lock`, not a
        rule (Design §13). Cursor-paginated. Platform-RBAC gated (`rbac:read`).
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulePage'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createRule
      summary: Create a data-plane rule (admin).
      description: |
        Creates a data-plane rule. Invalid config (empty principals, ttl <= 0, an
        unknown capability, a malformed selector, effect not allow|deny) is
        rejected PRE-COMMIT (`422`, FR-API-5). The `origin` is server-set to `api`.
        Platform-RBAC gated (`rbac:write`) + audited.
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: The rule was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/rules/{ruleId}:
    parameters:
      - $ref: '#/components/parameters/RuleId'
    get:
      operationId: getRule
      summary: Get a data-plane rule (admin).
      description: Returns one rule by id. Platform-RBAC gated (`rbac:read`).
      tags:
        - rules
      responses:
        '200':
          description: The rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateRule
      summary: Update a data-plane rule (admin).
      description: |
        Replaces the mutable fields of a rule (the `name` is immutable). Invalid
        config is rejected pre-commit (`422`). An optional `version` enforces
        optimistic concurrency (a stale version is a `409`). Platform-RBAC gated
        (`rbac:write`) + audited.
      tags:
        - rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: The updated rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteRule
      summary: Delete a data-plane rule (admin).
      description: |
        Deletes a rule (idempotent — `204` whether or not it existed).
        Platform-RBAC gated (`rbac:write`) + audited.
      tags:
        - rules
      responses:
        '204':
          description: The rule was deleted (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/roles:
    get:
      operationId: listRoles
      summary: List platform roles (admin).
      description: |
        Lists platform-RBAC roles (`config.platform_role`; FR-PADM-1) — named sets
        of the closed platform-permission vocabulary. Cursor-paginated.
        Platform-RBAC gated (`rbac:read`).
      tags:
        - roles
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of roles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePage'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createRole
      summary: Create a platform role (admin).
      description: |
        Creates a platform role. A permission outside the closed vocabulary is
        rejected pre-commit (`422`). Platform-RBAC gated (`rbac:write`) + audited.
      tags:
        - roles
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: The role was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/roles/{roleId}:
    parameters:
      - $ref: '#/components/parameters/RoleId'
    get:
      operationId: getRole
      summary: Get a platform role (admin).
      description: Returns one role by id. Platform-RBAC gated (`rbac:read`).
      tags:
        - roles
      responses:
        '200':
          description: The role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateRole
      summary: Update a platform role (admin).
      description: |
        Replaces a role's permissions/description (the `name` is immutable). An
        out-of-vocabulary permission is a `422`; a stale `version` is a `409`.
        Platform-RBAC gated (`rbac:write`) + audited.
      tags:
        - roles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: The updated role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteRole
      summary: Delete a platform role (admin).
      description: |
        Deletes a role and cascades its bindings (idempotent). Platform-RBAC gated
        (`rbac:write`) + audited.
      tags:
        - roles
      responses:
        '204':
          description: The role was deleted (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/role-bindings:
    get:
      operationId: listRoleBindings
      summary: List role bindings (admin).
      description: |
        Lists platform role bindings (`config.role_binding`; FR-PADM-2) — subject
        (user|group) -> role, optionally scoped for `recording:replay/export`.
        Cursor-paginated. Platform-RBAC gated (`rbac:read`).
      tags:
        - role-bindings
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of role bindings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleBindingPage'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createRoleBinding
      summary: Create a role binding (admin).
      description: |
        Binds a subject to a role. An unknown `roleId` or a malformed scope is a
        `422`; a duplicate (role, subjectKind, subject) is a `409`. Platform-RBAC
        gated (`rbac:write`) + audited.
      tags:
        - role-bindings
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleBindingRequest'
      responses:
        '201':
          description: The role binding was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleBindingResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/role-bindings/{bindingId}:
    parameters:
      - $ref: '#/components/parameters/BindingId'
    get:
      operationId: getRoleBinding
      summary: Get a role binding (admin).
      description: Returns one role binding by id. Platform-RBAC gated (`rbac:read`).
      tags:
        - role-bindings
      responses:
        '200':
          description: The role binding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleBindingResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateRoleBinding
      summary: Update a role binding (admin).
      description: |
        Replaces a binding's scope (the subject and role are immutable — rebind by
        delete + create). A stale `version` is a `409`. Platform-RBAC gated
        (`rbac:write`) + audited.
      tags:
        - role-bindings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleBindingRequest'
      responses:
        '200':
          description: The updated role binding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleBindingResource'
        '400':
