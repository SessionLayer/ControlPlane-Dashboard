            - agentless
        status:
          type: string
          enum:
            - pending
            - active
            - quarantined
            - removed
        health:
          type: string
          enum:
            - unknown
            - healthy
            - unhealthy
            - unreachable
        address:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        owningGateway:
          type: string
          description: The Gateway currently owning the node's agent control channel (agent model); absent otherwise.
        statusReason:
          type: string
        statusChangedBy:
          type: string
        statusChangedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
    NodeList:
      type: object
      title: Node List
      required:
        - nodes
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeResource'
      additionalProperties: false
    JitRequestSubmission:
      type: object
