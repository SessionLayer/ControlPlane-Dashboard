    # ============ Session 17 — shared enums & value types ============
    Origin:
      type: string
      title: Config Provenance
      description: |
        Provenance of a config row (Design §13). `api`/`ui` mark which admin surface
        last wrote it; `default` is a seeded/cold-start default. Read-only.
      enum:
        - api
        - ui
        - default
    Capability:
      type: string
      title: SSH Capability
      description: A policy-gated SSH channel capability (Design D14).
      enum:
        - shell
        - exec
        - sftp
        - scp
        - port_forward_local
        - port_forward_remote
        - agent_forward
        - x11
    PlatformPermission:
      type: string
      title: Platform Permission
      description: A granular platform-RBAC permission from the closed vocabulary (FR-PADM-1).
      enum:
        - rbac:read
        - rbac:write
        - node:enroll
        - node:quarantine
        - node:remove
        - ca:manage
        - ca:rotate
        - request:approve
        - recording:replay
        - recording:export
        - recording:delete
        - audit:read
        - user:manage
        - settings:write
        - lock:read
        - lock:write
        - breakglass:manage
    Effect:
