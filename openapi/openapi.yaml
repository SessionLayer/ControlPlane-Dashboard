      enum:
        - allow
        - deny
    ConnectorKind:
      type: string
      title: Connector Kind
      enum:
        - agent
        - agentless
    SubjectKind:
      type: string
      title: Binding Subject Kind
      enum:
        - user
        - group
    CaKind:
      type: string
      title: CA Kind
      enum:
        - user
        - session
        - host
    CaBackend:
