    # ============ Session 17 — recordings (Part C, frozen) ============
    RecordingResource:
      type: object
      title: Recording
      description: Session recording metadata (Design §12). NEVER carries recording bytes.
      required:
        - id
        - sessionId
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        identity:
          type: string
          description: The session subject identity (the recorded user).
        nodeId:
          type: string
          format: uuid
        format:
          type: string
          description: Capture format (e.g. `asciicast-v2`).
        status:
          type: string
          description: Lifecycle status (`recording|finalized|truncated|failed`).
        wormMode:
          type: string
          description: WORM object-lock mode (`compliance|governance`).
        sizeBytes:
          type: integer
          format: int64
        hashChainHead:
          type: string
          description: The tamper-evidence hash-chain head (hex).
        encryptionKeyRef:
          type: string
          description: A reference to the customer-held encryption key — NEVER key material.
        legalHold:
          type: boolean
        retentionUntil:
          type: string
          format: date-time
        prunedAt:
          type: string
          format: date-time
          description: When the encrypted object was deleted (retention prune or governance delete); metadata is retained.
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      additionalProperties: false
    LegalHoldRequest:
      type: object
      title: Legal Hold Request
      description: Places or releases a legal hold on a recording (FR-AUD-6).
      required:
        - held
      properties:
        held:
          type: boolean
          description: True to place a legal hold, false to release it.
        reason:
          type: string
          maxLength: 4096
      additionalProperties: false
