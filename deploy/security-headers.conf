# SessionLayer Control Plane Dashboard — security response headers.
#
# `include`d from every location that declares its own add_header: nginx drops
# ALL inherited add_header directives in any block that sets one of its own, so
# these must be repeated wherever a location adds Cache-Control. See nginx.conf.
#
# Fill in the cross-origin hosts the SPA legitimately talks to (see README.md).
# A single-origin reverse-proxy deployment (UI + CP + object store all behind
# this proxy) can reduce connect-src to just 'self'.
#
#   __CP_ORIGIN__            e.g. https://cp.example.com       REST API (openapi-fetch)
#   __OIDC_ORIGIN__          e.g. https://idp.example.com      OIDC token exchange
#   __OBJECT_STORE_ORIGIN__  e.g. https://recordings.example   signed recording objects

# connect-src MUST include every origin the app fetches from, or these break:
#   - __CP_ORIGIN__:           every REST call (api client).
#   - __OIDC_ORIGIN__:         the authorization-code + PKCE token exchange.
#   - __OBJECT_STORE_ORIGIN__: client-side recording replay/export downloads the
#                              still-encrypted object DIRECTLY from the signed URL.
# script-src and style-src stay strict 'self' with NO 'unsafe-inline': the built
# index.html carries no inline JS, and the app's only inline styles are React
# `style={{}}` props — those are CSSOM property writes, which CSP style-src does
# NOT govern (verified: a securitypolicyviolation assertion in e2e/csp.spec.ts).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' __CP_ORIGIN__ __OIDC_ORIGIN__ __OBJECT_STORE_ORIGIN__; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; worker-src 'none'; upgrade-insecure-requests" always;

# HSTS (assumes TLS is terminated in front of this). Two years + preload.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

add_header X-Content-Type-Options "nosniff" always;
# X-Frame-Options is redundant with frame-ancestors 'none' but covers legacy UAs.
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;

# NOTE: Cross-Origin-Embedder-Policy is intentionally NOT set. `require-corp`
# would block the cross-origin fetch of signed recording objects (replay/export),
# which the object store does not serve with CORP/CORS for embedding.
