# Reference production serving config for the SessionLayer Control Plane
# Dashboard — a static Vite bundle. Setting security response headers is the
# serving layer's responsibility; a client-only bundle cannot set them itself
# (audit/F-headers-1, CLAUDE.md security posture). Adapt this to your reverse
# proxy of choice — the header set (see security-headers.conf) is the contract,
# not nginx specifically.
#
# Prerequisites:
#   - Terminate TLS in front of this server (HSTS below assumes https).
#   - Serve the output of `npm run build` (the dist/ directory).
#   - Replace the __*_ORIGIN__ placeholders in security-headers.conf.

server {
  listen 443 ssl;
  http2 on;
  server_name dashboard.example.com; # <- your host

  # ssl_certificate / ssl_certificate_key are provided by your TLS setup.

  root /var/www/controlplane-dashboard; # <- the built dist/ directory
  index index.html;

  # Applies to responses not served by a location below (e.g. early errors).
  include security-headers.conf;

  # Content-hashed assets — Vite fingerprints every file under /assets/, so a new
  # build yields a new URL; cache them immutably. The include is REQUIRED here:
  # this location's add_header would otherwise drop all inherited security headers.
  location /assets/ {
    include security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # SPA entry: never cache index.html so a new deploy is picked up immediately,
  # and send every client-side route (TanStack Router) back to it.
  location / {
    include security-headers.conf;
    add_header Cache-Control "no-store" always;
    try_files $uri /index.html;
  }
}
