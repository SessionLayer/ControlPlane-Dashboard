# Dependabot keeps dependencies current and surfaces GitHub security advisories
# as pull requests. It complements the in-CI `npm audit` gate rather than
# replacing it. Update PRs run through the normal `gate` CI check before auto-merge.
version: 2
updates:
  # npm dependencies (package.json / package-lock.json at the repo root).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: deps

  # GitHub Actions used by .github/workflows (kept SHA-pinned).
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
